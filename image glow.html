<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glowing Circular Card</title>

<style>
body{
    background:#1a5a7b;
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:sans-serif;
}

.card{
    position: relative;
    width:260px;
    height:260px;
    border-radius:50%;
    overflow:hidden;
}

/* glowing spinning border */
.card::before{
    content:"";
    position:absolute;
    inset:-50%;
    border-radius:50%;
    background: conic-gradient(
    from 0deg,
    #ff00ff 0deg 45deg,      
    transparent 45deg 135deg, 
    #00aaff 135deg 180deg,    
    transparent 180deg 315deg, 
    #ff00ff 315deg 360deg
);
    animation: spin 3s linear infinite;
    filter: blur(15px) saturate(2);
}

/* card center mask */
.card::after{
    content:"";
    position:absolute;
    inset:5px;
    border-radius:50%;
    background:#1a5a7b;
}

/* image inside */
.card img{
    position: relative;
    width: 100%;
    height: 100%;
    border-radius:50%;
    z-index:1;
}

@keyframes spin{
    from{transform: rotate(0deg);}
    to{transform: rotate(360deg);}
}
</style>
</head>
<body>

<div class="card">
    <img src="images (10).png" alt="">
</div>

</body>
</html>
